<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VOIRA — Skincare & Wardrobe, honestly chosen</title>
<meta name="description" content="A considered edit of skincare and clothing. What's worth your money, nothing that isn't.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..450&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     VOIRA — link in bio
     Palette and type drawn from the editorial / fine-art inspo:
     blush parchment · muted olive · warm taupe · deep charcoal
     ============================================================ */

  :root{
    --parchment: #ECE4DB;
    --parchment-2:#E5DACC;
    --ink:       #2B2620;
    --ink-soft:  #5E564B;
    --olive:     #6F6B4E;
    --olive-deep:#54512F;
    --taupe:     #A2917C;
    --blush:     #DDC9BC;
    --bone:      #F4EEE4;
    --line:      #CFC0AF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html{ -webkit-text-size-adjust:100%; }

  body{
    min-height:100vh;
    background:
      radial-gradient(125% 78% at 50% 0%, #F3ECE2 0%, #ECE4DB 46%, #E5DBCD 100%);
    color:var(--ink);
    font-family:"Jost", system-ui, sans-serif;
    font-weight:400;
    line-height:1.55;
    display:flex;
    justify-content:center;
    padding:clamp(34px,7vw,64px) 22px clamp(40px,8vw,72px);
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    width:100%;
    max-width:452px;
    text-align:center;
  }

  /* ---------- Header / masthead ---------- */
  .crest{
    display:block;
    width:42px;
    height:auto;
    margin:0 auto 14px;
    opacity:0;
  }
  .crest path, .crest circle{
    fill:none;
    stroke:var(--olive);
    stroke-width:1;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .crest circle{ fill:var(--olive); stroke:none; }

  .monogram{
    width:78px; height:78px;
    margin:0 auto 22px;
    border:1px solid var(--olive);
    border-radius:50%;
    background:var(--parchment-2);
    display:flex; align-items:center; justify-content:center;
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:380;
    font-size:34px;
    color:var(--ink);
    line-height:1;
    overflow:hidden;
    opacity:0;
  }
  /* If you add a photo later, it will fill the circle: */
  .monogram img{ width:100%; height:100%; object-fit:cover; }

  .wordmark{
    font-family:"Fraunces", serif;
    font-weight:330;
    font-size:clamp(2.05rem,9vw,2.7rem);
    letter-spacing:0.34em;
    text-indent:0.34em;           /* balances the right-side tracking */
    color:var(--ink);
    line-height:1;
    opacity:0;
  }

  .ruler{
    display:flex; align-items:center; justify-content:center;
    gap:9px;
    margin:18px auto 16px;
    opacity:0;
  }
  .ruler span{ width:34px; height:1px; background:var(--line); }
  .ruler i{
    width:4px; height:4px; transform:rotate(45deg);
    background:var(--olive); display:block;
  }

  .eyebrow{
    font-family:"Jost", sans-serif;
    font-weight:400;
    font-size:0.66rem;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--olive);
    opacity:0;
  }

  .tagline{
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:350;
    font-size:clamp(1.12rem,5vw,1.4rem);
    line-height:1.4;
    color:var(--ink);
    max-width:21ch;
    margin:14px auto 0;
    opacity:0;
  }

  .bloom{
    display:block;
    width:clamp(186px,64%,216px);
    height:auto;
    margin:clamp(24px,6vw,32px) auto clamp(0px,1vw,4px);
    opacity:0;
  }

  /* ---------- The edit (links) ---------- */
  .section-label{
    display:flex; align-items:center; justify-content:center;
    gap:14px;
    margin:clamp(38px,8vw,52px) auto clamp(8px,3vw,16px);
    opacity:0;
  }
  .section-label span{ flex:0 0 26px; height:1px; background:var(--line); }
  .section-label b{
    font-family:"Jost", sans-serif;
    font-weight:500;
    font-size:0.64rem;
    letter-spacing:0.34em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }

  .links{
    border-top:1px solid var(--line);
    text-align:left;
  }

  .link{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:18px 14px 18px 6px;
    border-bottom:1px solid var(--line);
    text-decoration:none;
    color:var(--ink);
    transition:background .32s ease, padding .32s ease, color .32s ease;
    opacity:0;
  }
  .link-title{
    display:block;
    font-family:"Fraunces", serif;
    font-weight:380;
    font-size:1.14rem;
    letter-spacing:.005em;
    line-height:1.25;
    transition:color .32s ease;
  }
  .link-note{
    display:block;
    font-family:"Jost", sans-serif;
    font-weight:300;
    font-size:0.78rem;
    letter-spacing:.01em;
    color:var(--ink-soft);
    margin-top:3px;
  }
  .link-arrow{
    flex:0 0 auto;
    font-family:"Jost", sans-serif;
    font-weight:300;
    font-size:1.1rem;
    color:var(--taupe);
    transition:transform .32s ease, color .32s ease;
  }

  @media (hover:hover){
    .link:hover{
      background:rgba(221,201,188,.42);
      padding-left:16px; padding-right:16px;
    }
    .link:hover .link-title{ color:var(--olive-deep); }
    .link:hover .link-arrow{ transform:translateX(5px); color:var(--olive-deep); }
  }
  .link:active{ background:rgba(221,201,188,.55); }

  .link:focus-visible{
    outline:1.5px solid var(--olive);
    outline-offset:-1px;
    background:rgba(221,201,188,.35);
  }

  .contact-intro{
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:340;
    font-size:0.95rem;
    color:var(--ink-soft);
    margin-top:10px;
    opacity:0;
  }
  .contact-btns{
    max-width:322px;
    margin:16px auto 0;
  }
  .contact-btn{
    display:flex; align-items:center; justify-content:center; gap:9px;
    padding:13px 16px;
    border:1px solid var(--olive);
    border-radius:2px;
    text-decoration:none;
    color:var(--ink);
    font-family:"Jost", sans-serif;
    font-weight:400;
    font-size:0.84rem;
    letter-spacing:0.02em;
    transition:background .3s ease, color .3s ease;
    opacity:0;
  }
  .contact-btn + .contact-btn{ margin-top:11px; }
  .contact-btn:hover, .contact-btn:focus-visible{
    background:var(--olive);
    color:var(--bone);
    outline:none;
  }
  .cbi{ width:16px; height:16px; flex:0 0 auto; }
  .cbi rect, .cbi path, .cbi circle{
    fill:none; stroke:currentColor; stroke-width:1.4;
    stroke-linecap:round; stroke-linejoin:round;
  }

  /* ---------- Footer ---------- */
  footer{
    margin-top:clamp(34px,7vw,48px);
    opacity:0;
  }
  .ig{
    display:inline-block;
    font-family:"Jost", sans-serif;
    font-weight:500;
    font-size:0.72rem;
    letter-spacing:0.26em;
    text-transform:uppercase;
    color:var(--ink);
    text-decoration:none;
    padding-bottom:3px;
    border-bottom:1px solid var(--line);
    transition:color .3s ease, border-color .3s ease;
  }
  .ig:hover, .ig:focus-visible{ color:var(--olive-deep); border-color:var(--olive); outline:none; }
  .footnote{
    margin-top:14px;
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:340;
    font-size:0.86rem;
    color:var(--ink-soft);
  }

  /* ---------- Entrance motion ---------- */
  @keyframes rise{
    from{ opacity:0; transform:translateY(9px); }
    to  { opacity:1; transform:translateY(0); }
  }
  .reveal{ animation:rise .7s cubic-bezier(.22,.61,.36,1) forwards; }

  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; transition:none !important; }
    .crest,.monogram,.wordmark,.ruler,.eyebrow,.tagline,
    .section-label,.link,.contact-intro,.contact-btn,footer{ opacity:1 !important; }
  }
</style>
</head>

<body>
  <main class="wrap">

    <!-- Signature: delicate botanical sprig -->
    <svg class="crest reveal" style="animation-delay:.05s" viewBox="0 0 48 70" aria-hidden="true">
      <path d="M24 66 C 23 50 24 34 24 13"/>
      <path d="M24 50 C 15 49 9 43 8 35 C 16 37 22 43 24 50 Z"/>
      <path d="M24 50 C 33 49 39 43 40 35 C 32 37 26 43 24 50 Z"/>
      <path d="M24 36 C 17 35 12 30 11 24 C 18 26 22 31 24 36 Z"/>
      <path d="M24 36 C 31 35 36 30 37 24 C 30 26 26 31 24 36 Z"/>
      <path d="M24 25 C 19 24 15 20 14 15 C 19 17 22 20 24 25 Z"/>
      <path d="M24 25 C 29 24 33 20 34 15 C 29 17 26 20 24 25 Z"/>
      <circle cx="24" cy="10" r="2.5"/>
    </svg>

    <!-- Monogram. Swap for a photo later (see notes). -->
    <div class="monogram reveal" style="animation-delay:.12s">V</div>

    <h1 class="wordmark reveal" style="animation-delay:.2s">VOIRA</h1>

    <div class="ruler reveal" style="animation-delay:.28s">
      <span></span><i></i><span></span>
    </div>

    <p class="eyebrow reveal" style="animation-delay:.34s">Skin&nbsp;·&nbsp;Wardrobe&nbsp;·&nbsp;Chosen&nbsp;with&nbsp;intention</p>

    <p class="tagline reveal" style="animation-delay:.42s">What’s worth your money, nothing that isn’t.</p>

    <!-- elegant floral flourish (line-art bloom with leafy stems) -->
    <svg class="bloom reveal" style="animation-delay:.5s" viewBox="0 0 200 100" aria-hidden="true">
      <g opacity="0.85" stroke="#6F6B4E" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <!-- stems -->
        <path d="M100 39 C 83 45 65 46 47 40 C 37 37 29 42 23 52"/>
        <path d="M100 39 C 117 45 135 46 153 40 C 163 37 171 42 177 52"/>
        <!-- leaves -->
        <path d="M65 45 C 59 40 54 40 50 44 C 54 48 60 49 65 45 Z"/>
        <path d="M41 41 C 36 36 31 37 28 41 C 32 45 37 45 41 41 Z"/>
        <path d="M135 45 C 141 40 146 40 150 44 C 146 48 140 49 135 45 Z"/>
        <path d="M159 41 C 164 36 169 37 172 41 C 168 45 163 45 159 41 Z"/>
        <!-- tip buds -->
        <circle cx="23" cy="52" r="2.2" fill="#6F6B4E" stroke="none"/>
        <circle cx="177" cy="52" r="2.2" fill="#6F6B4E" stroke="none"/>
        <!-- central bloom -->
        <g transform="translate(100 31)">
          <path transform="rotate(0)"   d="M0 0 C -10 -3 -14 -16 -5 -25 C -2 -28 2 -28 5 -25 C 14 -16 10 -3 0 0 Z"/>
          <path transform="rotate(72)"  d="M0 0 C -10 -3 -14 -16 -5 -25 C -2 -28 2 -28 5 -25 C 14 -16 10 -3 0 0 Z"/>
          <path transform="rotate(144)" d="M0 0 C -10 -3 -14 -16 -5 -25 C -2 -28 2 -28 5 -25 C 14 -16 10 -3 0 0 Z"/>
          <path transform="rotate(216)" d="M0 0 C -10 -3 -14 -16 -5 -25 C -2 -28 2 -28 5 -25 C 14 -16 10 -3 0 0 Z"/>
          <path transform="rotate(288)" d="M0 0 C -10 -3 -14 -16 -5 -25 C -2 -28 2 -28 5 -25 C 14 -16 10 -3 0 0 Z"/>
          <circle r="5.4" fill="none" stroke="#6F6B4E" stroke-width="1"/>
          <circle r="2.4" fill="#6F6B4E" stroke="none"/>
        </g>
      </g>
    </svg>

    <!-- THE EDIT -->
    <div class="section-label reveal" style="animation-delay:.6s">
      <span></span><b>The Edit</b><span></span>
    </div>

    <nav class="links" id="links" aria-label="Curated links"></nav>

    <!-- GET IN TOUCH -->
    <div class="section-label reveal" style="animation-delay:1s">
      <span></span><b>Get in touch</b><span></span>
    </div>
    <p class="contact-intro reveal" style="animation-delay:1.06s">For collaborations &amp; enquiries</p>
    <div class="contact-btns">
      <a class="contact-btn reveal" style="animation-delay:1.12s" href="mailto:voira.neu@gmail.com">
        <svg class="cbi" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7 L12 13 L20.5 7"/></svg>
        voira.neu@gmail.com
      </a>
    </div>

    <footer class="reveal" style="animation-delay:1.25s">
      <a class="ig" href="https://instagram.com/voira" target="_blank" rel="noopener">@voira on Instagram</a>
      <p class="footnote">Skincare &amp; wardrobe, honestly chosen.</p>
    </footer>

  </main>

<script>
/* ════════════════════════════════════════════════════════════════
   YOUR LINKS  —  this is the ONLY part you'll ever need to edit.

   • Replace each "url" with your EarnKaro affiliate link
     (keep the quotation marks).
   • Change any "title" or "note" to whatever you like.
   • Add a new button: copy a { ... } block and paste it in.
   • Remove one: delete its { ... } block.
   • Keep the commas between blocks.
   ════════════════════════════════════════════════════════════════ */
const links = [
  {
    title: "The skincare edit",
    note:  "What I actually use — nothing I don’t",
    url:   "#"
  },
  {
    title: "The wardrobe edit",
    note:  "Pieces worth keeping",
    url:   "#"
  },
  {
    title: "This week’s finds",
    note:  "Just added",
    url:   "#"
  },
  {
    title: "Everyday essentials",
    note:  "The quiet basics I repurchase",
    url:   "#"
  },
  {
    title: "Shop everything",
    note:  "The full edit",
    url:   "#"
  }
];
/* ──────────────  nothing below here needs changing  ────────────── */

const wrap = document.getElementById("links");
links.forEach((item, i) => {
  const a = document.createElement("a");
  a.className = "link reveal";
  a.href = item.url || "#";
  a.style.animationDelay = (0.68 + i * 0.07) + "s";
  if (/^https?:/i.test(item.url)) { a.target = "_blank"; a.rel = "noopener"; }
  a.innerHTML =
    '<span class="link-main">' +
      '<span class="link-title">' + item.title + '</span>' +
      (item.note ? '<span class="link-note">' + item.note + '</span>' : '') +
    '</span>' +
    '<span class="link-arrow" aria-hidden="true">&#8594;</span>';
  wrap.appendChild(a);
});
</script>
</body>
</html>
